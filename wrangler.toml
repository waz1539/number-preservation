# 这个名字决定了你最终的 API 链接前缀，比如 https://esim-api.你的用户名.workers.dev
name = "esim-api"

# 明确告诉 Cloudflare 我们后端代码的准确路径
main = "worker/worker.js"

# 更新为最新的兼容性日期，满足 Cloudflare 新版要求
compatibility_date = "2026-05-31"

# 新版 Cloudflare (Wrangler v3.109.0+) 强烈建议添加的日志观测配置，消除构建警告
[observability]
enabled = true

# 自动配置定时任务（每天 UTC 02:00，北京时间 10:00）
[triggers]
crons = ["0 2 * * *"]

# 自动绑定 KV 数据库
[[kv_namespaces]]
binding = "ESIM_DB"
id = "9de8c27e9337404995f1c77b56784d60"
